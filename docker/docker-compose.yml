services:
  sglang:
    image: lmsysorg/sglang:latest
    container_name: sglang-server
    ports:
      - "30000:30000"
    volumes:
      - hf-cache:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    command: >
      python -m sglang.launch_server
      --model-path ddorin/minecraft-assistant-qwen3-8b
      --host 0.0.0.0
      --port 30000
      --dtype bfloat16
      --quantization fp8
      --mem-fraction-static 0.88
      --reasoning-parser qwen3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  rag:
    build:
      context: .
      dockerfile: Dockerfile.rag
    container_name: rag-server
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - SGLANG_URL=http://sglang:30000
      - EMBEDDING_URL=${EMBEDDING_URL:-http://sglang:30000}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-}
      - EMBEDDING_CANDIDATE_LIMIT=${EMBEDDING_CANDIDATE_LIMIT:-30}
      - EMBEDDING_WEIGHT=${EMBEDDING_WEIGHT:-35}
    depends_on:
      - sglang
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http rag:8000
    depends_on:
      - rag
    restart: unless-stopped

volumes:
  hf-cache:
    driver: local
